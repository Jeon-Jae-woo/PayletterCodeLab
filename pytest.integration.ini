[pytest]
testpaths = tests/integration
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# [PR-4] 통합 테스트 전용 설정 — Mock 경계: GITLAB_MOCK=true
# 커버리지 수집 안 함 (통합 테스트는 커버리지 아닌 시나리오 검증 목적)
addopts = -v --tb=short
log_cli = true
log_cli_level = WARNING
markers =
    happy: Happy Path 통합 테스트
    sad: Sad Path 통합 테스트
    edge: Edge Case 통합 테스트
